<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    radial-gradient(circle at top,#3b2c68,#1b1f4b,#090d24);
}

.moon{
    position:absolute;
    top:60px;
    right:50px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:#fffef2;

    box-shadow:
    0 0 30px white,
    0 0 60px #fff1a8,
    0 0 100px #fff1a8;
}

.stars{
    position:absolute;
    inset:0;
}

.star{
    position:absolute;
    color:#ffd700;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.3;}
    50%{opacity:1;}
}

.shooting-star{
    position:absolute;
    top:-100px;
    left:-100px;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 15px white;

    animation:shoot 8s linear infinite;
}

.shooting-star::after{
    content:"";
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(to right,white,transparent);
    transform:rotate(45deg);
    transform-origin:left center;
}

@keyframes shoot{

    0%{
        transform:translate(-100px,-100px);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translate(800px,800px);
        opacity:0;
    }
