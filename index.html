<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Años - María Camila</title>

<meta property="og:title" content="Mis 15 Años - María Camila">
<meta property="og:description" content="Celebración de 15 años">
<meta property="og:type" content="website">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        180deg,
        #f8fbff,
        #e6eef8,
        #d4e0ef
    );
    font-family:Georgia,serif;
    overflow:hidden;
}

.container{
    text-align:center;
    width:100%;
    max-width:650px;
    padding:20px;
}

.titulo{
    color:#b28b3c;
    margin-bottom:15px;
}

.titulo h2{
    font-size:clamp(22px,5vw,34px);
}

.nombre{
    font-size:clamp(42px,8vw,68px);
    color:#c59b38;
    margin-bottom:10px;
    line-height:1.1;

    text-shadow:
    0 2px 4px rgba(0,0,0,.08);
}

.sub{
    color:#7b7b7b;
    margin-bottom:35px;
    font-size:clamp(14px,3vw,18px);
}

.envelope{
    width:min(320px,85vw);
    height:220px;
    margin:auto;
    position:relative;
    cursor:pointer;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#ffffff;
    border-radius:8px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.12);
}

/* solapa superior */

.top{
    position:absolute;
    top:0;
    width:100%;
    height:110px;

    background:#f8fbff;

    clip-path:
    polygon(
        0 0,
        100% 0,
        50% 100%
    );

    transform-origin:top;
    transition:1.4s ease;
}

/* laterales */

.left{
    position:absolute;
    left:0;
    top:0;

    width:50%;
    height:100%;

    background:#eef4fb;

    clip-path:
    polygon(
        0 0,
        100% 50%,
        0 100%
    );

    transition:1.4s ease;
}

.right{
    position:absolute;
    right:0;
    top:0;

    width:50%;
    height:100%;

    background:#eef4fb;

    clip-path:
    polygon(
        100% 0,
        0 50%,
        100% 100%
    );

    transition:1.4s ease;
}

.open .top{
    transform:
    rotateX(180deg);
}

.open .left{
    transform:
    translateX(-30px);
}

.open .right{
    transform:
    translateX(30px);
}

.seal{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:85px;
    height:85px;

    border-radius:50%;

    background:
    radial-gradient(
        circle at 30% 30%,
        #fff5bf,
        #f5d36c,
        #d4af37,
        #9d7722
    );

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
    inset 0 4px 8px rgba(255,255,255,.8),
    inset 0 -6px 8px rgba(0,0,0,.2),
    0 8px 18px rgba(0,0,0,.15);

    z-index:20;

    animation:pulse 2s infinite;
}

.seal span{

    font-style:italic;
    font-size:36px;
    font-weight:bold;

    color:#fff5d5;

    text-shadow:
    0 1px 2px rgba(0,0,0,.2);
}

@keyframes pulse{

    0%{
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1.05);
    }

    100%{
        transform:
        translate(-50%,-50%)
        scale(1);
    }

}

.hint{
    margin-top:25px;
    color:#666;
}

.message{
    opacity:0;
    transition:1s;
    margin-top:30px;

    color:#b28b3c;
    font-size:20px;
}

.show{
    opacity:1;
}

.spark{
    position:absolute;
    animation:subir 2.5s linear forwards;
    font-size:22px;
}

@keyframes subir{

    from{
        opacity:1;
        transform:
        translateY(0)
        scale(.6);
    }

    to{
        opacity:0;
        transform:
        translateY(-220px)
        scale(1.4);
    }

}

</style>
</head>

<body>

<div class="container">

    <div class="titulo">
        <h2>👑 Mis 15 Años 👑</h2>
    </div>

    <div class="nombre">
        María Camila
    </div>

    <div class="sub">
        Celebración de 15 años
    </div>

    <div class="envelope" id="envelope">

        <div class="base"></div>

        <div class="left"></div>
        <div class="right"></div>
        <div class="top"></div>

        <div class="seal" id="seal">
            <span>15</span>
        </div>

    </div>

    <div class="hint" id="hint">
        Toca el sello para abrir
    </div>

    <div class="message" id="msg">
        ✨ Has recibido una invitación muy especial ✨
        <br><br>
        Abriendo invitación...
    </div>

</div>

<script>

const canvaLink =
"https://mis15macamila.my.canva.site/";

const seal =
document.getElementById("seal");

const envelope =
document.getElementById("envelope");

seal.addEventListener("click",()=>{

    envelope.classList.add("open");

    document
    .getElementById("hint")
    .style.display="none";

    seal.style.display="none";

    document
    .getElementById("msg")
    .classList.add("show");

    const rect =
    envelope.getBoundingClientRect();

    for(let i=0;i<20;i++){

        const s =
        document.createElement("div");

        s.className="spark";

        s.innerHTML =
        ["✨","✦"][Math.floor(Math.random()*2)];

        s.style.left =
        (rect.left + rect.width/2 +
         (Math.random()*80-40))+"px";

        s.style.top =
        (rect.top + rect.height/2)+"px";

        document.body.appendChild(s);

        setTimeout(()=>{
            s.remove();
        },2500);

    }

    setTimeout(()=>{

        window.location.href =
        canvaLink;

    },4000);

});

</script>

</body>
</html>
