<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - María Camila</title>

<meta property="og:title" content="Mis 15 - María Camila">
<meta property="og:description" content="Una noche mágica te espera ✨">
<meta property="og:type" content="website">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        180deg,
        #f5f9ff,
        #dfeaf8,
        #c7d7eb
    );

    font-family:Georgia, serif;
}

.container{
    text-align:center;
    position:relative;
    z-index:5;
    width:100%;
}

.title{
    margin-bottom:30px;
    color:#b08a2e;
    text-shadow:0 0 8px rgba(255,215,0,.4);
}

.title h1{
    font-size:clamp(35px,7vw,60px);
    line-height:1.1;
}

.title p{
    margin-top:15px;
    color:#8a7446;
    font-size:clamp(15px,3vw,22px);
}

.envelope-wrapper{
    width:min(400px,90vw);
    height:min(400px,90vw);
    margin:auto;
    position:relative;
}

.envelope{
    width:100%;
    height:100%;
    position:relative;
}

.flap{
    position:absolute;
    background:#f8fbff;
    transition:1.5s ease;
    box-shadow:
    inset 0 0 15px rgba(255,255,255,.9),
    0 5px 20px rgba(0,0,0,.08);
}

.top{
    width:100%;
    height:50%;
    top:0;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top center;
}

.bottom{
    width:100%;
    height:50%;
    bottom:0;
    clip-path:polygon(0 100%,100% 100%,50% 0);
    transform-origin:bottom center;
}

.left{
    width:50%;
    height:100%;
    left:0;
    clip-path:polygon(0 0,100% 50%,0 100%);
    transform-origin:left center;
}

.right{
    width:50%;
    height:100%;
    right:0;
    clip-path:polygon(100% 0,0 50%,100% 100%);
    transform-origin:right center;
}

.open .top{
    transform:translateY(-140px) rotateX(50deg);
}

.open .bottom{
    transform:translateY(140px) rotateX(-50deg);
}

.open .left{
    transform:translateX(-140px);
}

.open .right{
    transform:translateX(140px);
}

.seal{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:80px;
    height:80px;

    border-radius:50%;

    background:
    radial-gradient(
        circle at 30% 30%,
        #fff4b5,
        #e0b53a 45%,
        #b5841f 80%,
        #8d6517 100%
    );

    border:3px solid rgba(255,255,255,.4);

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-weight:bold;
    font-size:20px;

    cursor:pointer;

    box-shadow:
    inset 0 2px 10px rgba(255,255,255,.7),
    inset 0 -5px 8px rgba(0,0,0,.25),
    0 10px 25px rgba(0,0,0,.2),
    0 0 25px rgba(212,175,55,.8);

    animation:pulse 2s infinite;

    z-index:100;
}

@keyframes pulse{

    0%{
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        transform:translate(-50%,-50%) scale(1.08);
    }

    100%{
        transform:translate(-50%,-50%) scale(1);
    }
}

.star{
    position:absolute;
    pointer-events:none;
    font-size:24px;
    animation:fly 3s linear forwards;
}

@keyframes fly{

    from{
        opacity:1;
        transform:
        translate(0,0)
        scale(.5);
    }

    to{
        opacity:0;
        transform:
        translate(
        calc(var(--x)*1px),
        calc(var(--y)*1px))
        scale(1.6);
    }

}

.message{
    margin-top:30px;
    opacity:0;
    transition:1s;
    color:#b08a2e;
    font-size:22px;
}

.message.show{
    opacity:1;
}

.hint{
    margin-top:25px;
    color:#6e6e6e;
}

.moon{
    position:absolute;
    right:50px;
    top:40px;

    width:100px;
    height:100px;

    border-radius:50%;

    background:white;

    box-shadow:
    0 0 30px white,
    0 0 70px rgba(255,255,255,.7);
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="container">

    <div class="title">
        <h1>
            Los 15 años de<br>
            María Camila
        </h1>

        <p>
            ✨ Una noche mágica te espera ✨
        </p>
    </div>

    <div class="envelope-wrapper">

        <div class="envelope" id="envelope">

            <div class="flap top"></div>
            <div class="flap bottom"></div>
            <div class="flap left"></div>
            <div class="flap right"></div>

        </div>

        <div class="seal" id="seal">
            MC
        </div>

    </div>

    <div class="hint" id="hint">
        Toca el sello para abrir la invitación
    </div>

    <div class="message" id="message">
        ✨ Has recibido una invitación muy especial ✨
        <br><br>
        Abriendo invitación...
    </div>

</div>

<script>

const canvaLink =
"https://mis15macamila.my.canva.site/";

const seal =
document.getElementById("seal");

const envelope =
document.getElementById("envelope");

seal.addEventListener("click",()=>{

    envelope.classList.add("open");

    seal.style.display="none";

    document.getElementById("hint")
    .style.display="none";

    document.getElementById("message")
    .classList.add("show");

    const rect =
    envelope.getBoundingClientRect();

    const icons =
    ["⭐","✨","🌟","✦"];

    for(let i=0;i<80;i++){

        const star =
        document.createElement("div");

        star.className = "star";

        star.innerHTML =
        icons[Math.floor(
        Math.random()*icons.length)];

        star.style.left =
        (rect.left + rect.width/2) + "px";

        star.style.top =
        (rect.top + rect.height/2) + "px";

        star.style.setProperty(
        "--x",
        (Math.random()*500)-250);

        star.style.setProperty(
        "--y",
        (-Math.random()*400)-50);

        document.body.appendChild(star);

        setTimeout(()=>{
            star.remove();
        },3000);

    }

    setTimeout(()=>{

        window.location.href =
        canvaLink;

    },4500);

});

</script>

</body>
</html>
