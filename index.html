<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación Especial</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    background:
    radial-gradient(circle at top,#473b7b,#1d2671,#090d24);

    font-family: 'Segoe UI', sans-serif;
    color:white;
}

.stars{
    position:fixed;
    inset:0;
    overflow:hidden;
}

.star{
    position:absolute;
    color:#ffd700;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle{
    0%,100%{opacity:.3}
    50%{opacity:1}
}

.container{
    text-align:center;
    z-index:2;
}

.title{
    margin-bottom:30px;
}

.title h1{
    font-size:1.8rem;
    font-weight:300;
}

.title p{
    margin-top:10px;
    color:#f5d56f;
}

.envelope{
    width:280px;
    height:180px;
    position:relative;
    cursor:pointer;
    margin:auto;
    perspective:1000px;
}

.base{
    width:100%;
    height:100%;
    background:#f8f1e7;
    border-radius:8px;
    position:absolute;
    box-shadow:0 0 30px rgba(255,215,0,.3);
}

.flap{
    position:absolute;
    width:0;
    height:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-top:100px solid #e8dbc8;
    transform-origin:top;
    transition:1.5s;
}

.open .flap{
    transform:rotateX(180deg);
}

.msg{
    position:absolute;
    width:100%;
    top:75px;
    text-align:center;
    color:#444;
    font-size:20px;
}

.magic{
    position:absolute;
    font-size:24px;
    animation:fly 3s linear forwards;
}

@keyframes fly{

    from{
        opacity:1;
        transform:translateY(0) scale(1);
    }

    to{
        opacity:0;
        transform:translateY(-300px) scale(2.5);
    }

}

.hiddenText{
    opacity:0;
    margin-top:25px;
    transition:1s;
    font-size:1.2rem;
    color:#ffd700;
}

.hiddenText.show{
    opacity:1;
}

</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="container">

    <div class="title">
        <h1>💌 Tienes una invitación especial</h1>
        <p>Toca el sobre para descubrirla</p>
    </div>

    <div class="envelope" id="envelope">
        <div class="base"></div>
        <div class="flap"></div>

        <div class="msg">
            ✨ Ábreme ✨
        </div>
    </div>

    <div class="hiddenText" id="message">
        🌙 Estás invitado a celebrar los 15 años de Maria Camila ✨
    </div>

</div>

<script>

const canvaLink =
"https://mis15macamila.my.canva.site/";

const starsContainer =
document.getElementById("stars");

for(let i=0;i<70;i++){

    const star =
    document.createElement("div");

    star.className="star";
    star.innerHTML="✦";

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    star.style.fontSize=
    (Math.random()*12+8)+"px";

    star.style.animationDelay=
    Math.random()*3+"s";

    starsContainer.appendChild(star);

}

const envelope =
document.getElementById("envelope");

envelope.addEventListener("click", ()=>{

    envelope.classList.add("open");

    document.getElementById("message")
    .classList.add("show");

    for(let i=0;i<70;i++){

        const sparkle =
        document.createElement("div");

        sparkle.className="magic";
        sparkle.innerHTML="⭐";

        sparkle.style.left =
        Math.random()*window.innerWidth+"px";

        sparkle.style.top =
        (window.innerHeight/2)+"px";

        document.body.appendChild(sparkle);

        setTimeout(()=>{
            sparkle.remove();
        },3000);

    }

    setTimeout(()=>{

        window.location.href =
        canvaLink;

    },3500);

});

</script>

</body>
</html>
