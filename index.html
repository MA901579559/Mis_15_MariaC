<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - María Camila</title>

<meta property="og:title" content="Mis 15 - María Camila">
<meta property="og:description" content="Una noche mágica te espera bajo las estrellas ✨">
<meta property="og:type" content="website">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#08122f,#151f5d,#2b1055);
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;
}

.container{
    position:relative;
    width:100%;
    max-width:500px;
    padding:20px;
    z-index:5;
}

.nombre{
    font-size:clamp(28px,6vw,42px);
    color:#ffd700;
    margin-bottom:10px;
    text-shadow:0 0 10px gold;
}

.subtitulo{
    font-size:clamp(14px,3vw,18px);
    margin-bottom:30px;
}

.moon{
    position:absolute;
    top:30px;
    right:30px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:#fffce6;
    box-shadow:
        0 0 25px #fff,
        0 0 60px #fff6b0;
}

.envelope{
    width:min(280px,80vw);
    height:180px;
    margin:auto;
    position:relative;
    cursor:pointer;
}

.base{
    position:absolute;
    width:100%;
    height:100%;
    background:#f8f1e7;
    border-radius:12px;
}

.flap{
    position:absolute;
    width:0;
    height:0;
    border-left:140px solid transparent;
    border-right:140px solid transparent;
    border-top:100px solid #e7d8c8;
    transform-origin:top;
    transition:1.2s;
}

.open .flap{
    transform:rotateX(180deg);
}

.seal{
    position:absolute;
    width:55px;
    height:55px;
    border-radius:50%;
    background:linear-gradient(135deg,#ffd700,#c69200);
    top:75px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-weight:bold;
    box-shadow:0 0 20px gold;
}

.msg{
    position:absolute;
    width:100%;
    top:135px;
    color:#444;
    font-weight:bold;
}

.aviso{
    margin-top:25px;
}

.mensaje{
    opacity:0;
    margin-top:25px;
    color:#ffd700;
    transition:1s;
}

.mensaje.show{
    opacity:1;
}

.star{
    position:absolute;
    color:#ffd700;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2}
    50%{opacity:1}
}

.spark{
    position:absolute;
    font-size:22px;
    animation:subir 3s linear forwards;
}

@keyframes subir{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-250px);
        opacity:0;
    }
}

.shooting{
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(to right,#fff,transparent);
    transform:rotate(-35deg);
    animation:shoot 8s linear infinite;
}

@keyframes shoot{
    0%{
        left:-150px;
        top:100px;
        opacity:0;
    }
    10%{
        opacity:1;
    }
    100%{
        left:120%;
        top:250px;
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="moon"></div>
<div class="shooting"></div>

<div id="stars"></div>

<div class="container">

    <div class="nombre">
        Los 15 años de María Camila
    </div>

    <div class="subtitulo">
        Una noche mágica te espera bajo las estrellas...
    </div>

    <div class="envelope" id="envelope">

        <div class="base"></div>
        <div class="flap"></div>

        <div class="seal">
            MC
        </div>

        <div class="msg">
            💌 Ábreme
        </div>

    </div>

    <div class="aviso">
        Toca el sobre para descubrir tu invitación
    </div>

    <div class="mensaje" id="mensaje">
        ✨ Has recibido una invitación muy especial ✨
        <br><br>
        🌙 Abriendo invitación...
    </div>

</div>

<script>

const canvaLink = "https://mis15macamila.my.canva.site/";

const stars = document.getElementById("stars");

for(let i=0;i<60;i++){

    const s = document.createElement("div");

    s.className = "star";
    s.innerHTML = "✦";

    s.style.left = Math.random()*100 + "%";
    s.style.top = Math.random()*100 + "%";

    s.style.fontSize = (8 + Math.random()*10) + "px";

    stars.appendChild(s);
}

const envelope = document.getElementById("envelope");

envelope.addEventListener("click",()=>{

    envelope.classList.add("open");

    document
        .getElementById("mensaje")
        .classList.add("show");

    for(let i=0;i<80;i++){

        const spark = document.createElement("div");

        spark.className = "spark";
        spark.innerHTML = "⭐";

        spark.style.left =
            Math.random()*window.innerWidth + "px";

        spark.style.top =
            (window.innerHeight/2) + "px";

        document.body.appendChild(spark);

        setTimeout(()=>{
            spark.remove();
        },3000);
    }

    setTimeout(()=>{
        window.location.href = canvaLink;
    },3500);
});

</script>

</body>
</html>
