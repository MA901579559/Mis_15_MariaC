<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 - María Camila</title>

<meta property="og:title" content="Mis 15 - María Camila">
<meta property="og:description" content="Una noche mágica te espera bajo las estrellas ✨">
<meta property="og:type" content="website">

<link href="https://apis.com/css2?family=Cinzel:wght@400;600&family=Poppins:wght@300;400&display=swap

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;

    background:
    radial-gradient(circle at top,#3b2c68,#1b1f4b,#090d24);
}

.moon{
    position:absolute;
    top:60px;
    right:50px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:#fffef2;

    box-shadow:
    0 0 30px white,
    0 0 60px #fff1a8,
    0 0 100px #fff1a8;
}

.stars{
    position:absolute;
    inset:0;
}

.star{
    position:absolute;
    color:#ffd700;
    animation:twinkle 3s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.3;}
    50%{opacity:1;}
}

.shooting-star{
    position:absolute;
    top:-100px;
    left:-100px;
    width:4px;
    height:4px;
    border-radius:50%;
    background:white;
    box-shadow:0 0 15px white;

    animation:shoot 8s linear infinite;
}

.shooting-star::after{
    content:"";
    position:absolute;
    width:120px;
    height:2px;
    background:linear-gradient(to right,white,transparent);
    transform:rotate(45deg);
    transform-origin:left center;
}

@keyframes shoot{

    0%{
        transform:translate(-100px,-100px);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translate(800px,800px);
        opacity:0;
    }

}

.container{
    position:relative;
    z-index:5;
    color:white;
    padding:20px;
}

.nombre{
    font-family:'Cinzel',serif;
    color:#ffd700;
    font-size:2.3rem;
    margin-bottom:10px;

    text-shadow:
    0 0 10px gold,
    0 0 20px gold;
}

.subtitulo{
    margin-bottom:25px;
    font-size:1rem;
}

.envelope{
    width:300px;
    height:200px;
    margin:auto;
    position:relative;
    cursor:pointer;
}

.base{
    width:100%;
    height:100%;
    background:#f6f0e6;
    border-radius:10px;
    position:absolute;

    box-shadow:
    0 0 30px rgba(255,215,0,.4);
}

.flap{
    position:absolute;
    width:0;
    height:0;

    border-left:150px solid transparent;
    border-right:150px solid transparent;
    border-top:110px solid #e7d8c4;

    transform-origin:top;
    transition:1.5s;
}

.open .flap{
    transform:rotateX(180deg);
}

.seal{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;

    background:
    linear-gradient(
        135deg,
        #ffd700,
        #b8860b
    );

    display:flex;
    align-items:center;
    justify-content:center;

    font-weight:bold;
    color:white;

    top:95px;
    left:50%;
    transform:translateX(-50%);

    box-shadow:
    0 0 20px gold,
    0 0 40px gold;
}

.msg{
    position:absolute;
    width:100%;
    top:150px;
    color:#444;
    font-weight:600;
}

.resultado{
    margin-top:25px;
    opacity:0;
    transition:1s;
    color:#ffd700;
}

.resultado.show{
    opacity:1;
}

.magic{
    position:absolute;
    font-size:24px;
    animation:subir 3s linear forwards;
}

@keyframes subir{

    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(-350px);
        opacity:0;
    }
}

.aviso{
    margin-top:15px;
    font-size:.9rem;
    color:#ddd;
}

</style>
</head>

<body>

<div class="moon"></div>

<div class="stars" id="stars"></div>

<div class="shooting-star"></div>

<div class="container">

    <div class="nombre">
        Los 15 años de María Camila
    </div>

    <div class="subtitulo">
        Una noche mágica te espera bajo las estrellas...
    </div>

    <div class="envelope" id="envelope">

        <div class="base"></div>

        <div class="flap"></div>

        <div class="seal">
            MC
        </div>

        <div class="msg">
            💌 Ábreme
        </div>

    </div>

    <div class="aviso">
        Toca el sobre para abrir tu invitación
    </div>

    <div class="resultado" id="mensaje">
        ✨ Has recibido una invitación muy especial ✨
        <br><br>
        🌙 Abriendo invitación...
    </div>

</div>

<script>

const canvaLink =
"https://mis15macamila.my.canva.site/";

const stars =
document.getElementById("stars");

for(let i=0;i<90;i++){

    const star =
    document.createElement("div");

    star.className="star";
    star.innerHTML="✦";

    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";

    star.style.fontSize=
    (Math.random()*10+8)+"px";

    star.style.animationDelay=
    Math.random()*3+"s";

    stars.appendChild(star);

}

const envelope =
document.getElementById("envelope");

envelope.addEventListener("click",()=>{

    envelope.classList.add("open");

    document
    .getElementById("mensaje")
    .classList.add("show");

    for(let i=0;i<100;i++){

        const estrella =
        document.createElement("div");

        estrella.className="magic";
        estrella.innerHTML="⭐";

        estrella.style.left=
        Math.random()*window.innerWidth+"px";

        estrella.style.top=
        (window.innerHeight/2)+"px";

        document.body.appendChild(estrella);

        setTimeout(()=>{
            estrella.remove();
        },3000);
    }

    setTimeout(()=>{

        window.location.href =
        canvaLink;

    },4000);

});

</script>

</body>
</html>
