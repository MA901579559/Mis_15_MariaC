<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mis 15 Años - María Camila</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        180deg,
        #f8fbff,
        #e8f0f8,
        #d5e1ef
    );
    font-family:Georgia,serif;
    overflow:hidden;
}

.container{
    width:100%;
    max-width:700px;
    padding:20px;
    text-align:center;
}

.corona{
    font-size:34px;
    margin-bottom:8px;
}

.titulo{
    color:#b58a2f;
    font-size:28px;
}

.nombre{

    font-style:italic;
    font-size:clamp(52px,10vw,85px);

    background:
    linear-gradient(
        180deg,
        #fffad8,
        #f2d87a,
        #d4af37,
        #9f7d2a
    );

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    margin-top:5px;
    margin-bottom:10px;
}

.subtitulo{
    color:#6b7280;
    font-size:20px;
    margin-bottom:35px;
}

.envelope{

    position:relative;

    width:min(90vw,520px);
    height:min(70vw,340px);

    margin:auto;
}

.base{

    position:absolute;
    inset:0;

    background:#ffffff;

    border-radius:12px;

    box-shadow:
        0 15px 35px rgba(0,0,0,.12);
}

.top{

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:50%;

    background:#f7fbff;

    clip-path:polygon(
        0 0,
        100% 0,
        50% 100%
    );
}

.left{

    position:absolute;

    left:0;
    top:0;

    width:50%;
    height:100%;

    background:#ecf3fb;

    clip-path:polygon(
        0 0,
        100% 50%,
        0 100%
    );
}

.right{

    position:absolute;

    right:0;
    top:0;

    width:50%;
    height:100%;

    background:#ecf3fb;

    clip-path:polygon(
        100% 0,
        0 50%,
        100% 100%
    );
}

.seal{

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    width:90px;
    height:90px;

    border-radius:50%;

    background:
    radial-gradient(
        circle at 30% 30%,
        #fff7c7,
        #f1cf60,
        #d4af37,
        #9f7d2a
    );

    display:flex;
    justify-content:center;
    align-items:center;

    box-shadow:
        inset 0 4px 8px rgba(255,255,255,.8),
        inset 0 -6px 8px rgba(0,0,0,.2),
        0 6px 15px rgba(0,0,0,.15);

    animation:pulse 2s infinite;
}

.seal span{

    font-size:42px;
    font-style:italic;
    color:#fff9e3;
    font-weight:bold;
}

@keyframes pulse{

    0%,100%{
        transform:
        translate(-50%,-50%)
        scale(1);
    }

    50%{
        transform:
        translate(-50%,-50%)
        scale(1.05);
    }
}

.hint{
    margin-top:25px;
    color:#6b7280;
    font-size:18px;
}

.butterfly{

    position:absolute;

    font-size:28px;

    animation:float 3s ease-in-out infinite;
}

.b1{
    left:8%;
    top:25%;
}

.b2{
    right:8%;
    top:35%;
}

@keyframes float{

    0%,100%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }
}

</style>
</head>

<body>

<div class="butterfly b1">🦋</div>
<div class="butterfly b2">🦋</div>

<div class="container">

    <div class="corona">👑</div>

    <div class="titulo">
        Mis 15 Años
    </div>

    <div class="nombre">
        María Camila
    </div>

    <div class="subtitulo">
        Celebración de 15 años
    </div>

    <div class="envelope">

        <div class="base"></div>

        <div class="left"></div>
        <div class="right"></div>
        <div class="top"></div>

        <div class="seal">
            <span>15</span>
        </div>

    </div>

    <div class="hint">
        Toca el sello para abrir
    </div>

</div>

</body>
</html>
